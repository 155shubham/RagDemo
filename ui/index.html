<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Assistant</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #020c1b;
        font-family: Arial, sans-serif;
        color: white;
      }

      .chat-container {
        width: 90%;
        max-width: 700px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 25px;
        backdrop-filter: blur(10px);
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #64ffda;
      }

      .response-box {
        min-height: 180px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 20px;
        line-height: 1.7;
        overflow-y: auto;
        color: #dbeafe;
      }

      .input-container {
        display: flex;
        gap: 12px;
      }

      input {
        flex: 1;
        padding: 14px 16px;
        border-radius: 12px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 1rem;
      }

      input::placeholder {
        color: #94a3b8;
      }

      button {
        padding: 14px 22px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(45deg, #64ffda, #00c6ff);
        color: #02111f;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
      }

      button:hover {
        transform: translateY(-2px);
      }

      .loading {
        display: none;
        margin-top: 12px;
        color: #64ffda;
        font-size: 0.95rem;
      }

      .cursor {
        display: inline-block;
        width: 10px;
        animation: blink 1s infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <h1>RAG Assistant</h1>

      <div class="response-box" id="response">
        Ask something about your documents...
      </div>

      <div class="input-container">
        <input type="text" id="query" placeholder="Ask a question..." />

        <button onclick="sendQuery()">Send</button>
      </div>

      <div class="loading" id="loading">
        Thinking<span class="cursor">|</span>
      </div>
    </div>

    <script>
      async function sendQuery() {
        const query = document.getElementById("query").value;

        const responseBox = document.getElementById("response");

        const loading = document.getElementById("loading");

        if (!query.trim()) return;

        loading.style.display = "block";

        responseBox.innerHTML = "";

        try {
          // Replace with your FastAPI endpoint
          const response = await fetch("http://127.0.0.1:8000/query", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              question: query,
            }),
          });

          const data = await response.json();

          responseBox.innerHTML = data.answer;
        } catch (error) {
          responseBox.innerHTML = "Error connecting to RAG backend.";
        } finally {
          loading.style.display = "none";
        }
      }
    </script>
  </body>
</html>
